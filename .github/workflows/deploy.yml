name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd portfolio
          npm install          # ← npm ci 대신 npm install 사용

      - name: Build
        run: |
          cd portfolio
          npm run build        # vite.config의 outDir: '../docs' 로 빌드됨

      - name: Copy react_learning_log into docs
        run: |
          cp -r react_learning_log docs/react_learning_log

      - name: Commit & Push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: deploy [skip ci]"
          git push